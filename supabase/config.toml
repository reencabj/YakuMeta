# Fragmento para el CLI de Supabase. Si ya tienes `supabase init`, fusiona esta sección.
# La función valida JWT en la entrada de Supabase y además comprueba rol admin en código.

[functions.invite-user]
verify_jwt = true

# false: desde el navegador el preflight OPTIONS no lleva JWT; con true el gateway suele responder 401/CORS. El JWT se valida en cada POST dentro de la función.
[functions.notify-discord]
verify_jwt = false
